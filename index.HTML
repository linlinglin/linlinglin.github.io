<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑子露出鸡脚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            /* 页面全屏，居中展示图片 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* 背景色，可自行修改 */
        }
        img {
            /* 图片自适应屏幕，不拉伸 */
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- 替换 src 里的地址为你的 GIF 路径/网络地址 -->
    <img src="l.gif" alt="动图">
