<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑子露出鸡脚</title>
	<link rel="icon" href="main.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-top: 2vh;
        }

        /* 🔥 新增：用来包裹三张动图的横向容器 */
        .gif-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; /* 控制图片之间的间距，可以根据需要调整 */
            margin-bottom: 20px;
            z-index: 1;
        }

        .bg-gif {
            width: 287px;
            height: 296px;
            object-fit: contain;
			background-color: transparent; 
		}

        .container {
            background: rgba(255, 255, 255, 0.75);
            padding: 35px;
            padding-right: 0; 
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 1500px; 
            overflow-x: auto; 
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 14px; 
            color: #222;
            line-height: 1.6;
            white-space: pre; 
            text-align: left; 
            font-family: "Consolas", "Courier New", "Monaco", monospace; 
            display: inline-block; 
        }
    </style>
</head>

<body>
    <!-- 🔥 修改：用 wrapper 包裹左中右三张动图 -->
    <div class="gif-wrapper">
        <img src="top.gif" class="bg-gif" alt="左侧动图">
        <img src="bar.gif" class="bg-gif" alt="中间动图">
        <img src="top.gif" class="bg-gif" alt="右侧动图">
    </div>

	<div class="container">
		<h2>斐波那契数列生成器</h2>
		<div class="result" id="result"></div>
	</div>

<script>
window.onload = function showFib() {
    let n = 97; 
    let seq = [];
    let a = 0n, b = 1n; 
    
    for (let i = 0; i < n; i++) {
        seq.push(a.toString());
        [a, b] = [b, a + b];
    }

    // 从第二个开始输出（去掉开头的 0）
    seq.shift(); 

    const COLS = 6; // 6列显示
    
    let rows = [];
    let line = "";
    
    // 取消宽度对齐，仅用1个空格连接
    seq.forEach((numStr, idx) => {
        line += numStr + " "; 
        if ((idx + 1) % COLS === 0) {
            rows.push(line.trim()); 
            line = "";
        }
    });
    if (line) rows.push(line.trim()); 

    // 构建居中的金字塔（基于实际字符串长度）
    let totalRows = rows.length; 
    
    // 找出最底层最长的一行的实际字符长度
    let bottomRowTotalWidth = rows[totalRows - 1].length;
    
    let pyramid = rows.map((row, index) => {
        let currentRowLength = row.length;
        
        // 计算左侧需要填充的空格数，使其相对于最底层居中
        let indent = Math.floor((bottomRowTotalWidth - currentRowLength) / 2);
        
        return " ".repeat(indent) + row;
    });

    document.getElementById("result").innerText = pyramid.join("\n");
};
</script>
</body>
</html>
