<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑子露出鸡脚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-top: 8vh;
        }

        .bg-gif {
            width: 287px;
            height: 296px;
            object-fit: contain;
            margin-bottom: 20px;
            z-index: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 1250px; 
            overflow-x: auto; /* 小屏幕下允许横向滚动 */
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 14px; 
            color: #222;
            line-height: 1.6;
            white-space: pre; /* 核心：保留空格和换行格式 */
            text-align: left; /* 内部左对齐，靠JS生成的空格来定位 */
            font-family: "Consolas", "Courier New", monospace; /* 必须使用等宽字体 */
            display: inline-block; /* 让div宽度跟随文字内容收缩 */
        }
    </style>
</head>

<body>
    <img src="bar.gif" class="bg-gif" alt="动图">
	<div class="container">
		<h2>斐波那契数列生成器</h2>
		<div class="result" id="result"></div>
	</div>

<script>
window.onload = function showFib() {
    let n = 96;
    let seq = [];
    // 使用 BigInt (加n后缀) 保证第90多项的大数精度不丢失
    let a = 0n, b = 1n; 
    
    for (let i = 0; i < n; i++) {
        seq.push(a.toString());
        [a, b] = [b, a + b];
    }

    const COL_WIDTH = 21; // 固定每列宽度
    const COLS = 6;       // 固定6列
    let rows = [];
    let line = "";
    
    // 1. 将数列按6列分组拼接成行
    seq.forEach((numStr, idx) => {
        line += numStr.padStart(COL_WIDTH, " ");
        if ((idx + 1) % COLS === 0) {
            rows.push(line);
            line = "";
        }
    });
    if (line) rows.push(line); // 处理最后一行不足6个的情况

    // 2. 🔥 构建居中的竖直金字塔
    let totalRows = rows.length; // 共16行
    // 计算出最底层（也就是最长的一行）的实际字符长度
    let bottomRowLength = rows[totalRows - 1].length;
    
    let pyramid = rows.map((row, index) => {
        // 当前行的实际字符长度
        let currentRowLength = row.length;
        // 计算左侧需要填充的空格数，使其相对于最底层居中
        let indent = Math.floor((bottomRowLength - currentRowLength) / 2);
        
        return " ".repeat(indent) + row;
    });

    document.getElementById("result").innerText = pyramid.join("\n");
};
</script>
</body>
</html>
