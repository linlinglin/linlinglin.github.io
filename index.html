<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑子露出鸡脚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-top: 2vh;
        }

        .bg-gif {
            width: 287px;
            height: 296px;
            object-fit: contain;
            margin-bottom: 20px;
            z-index: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 1250px; 
            overflow-x: auto; 
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 14px; 
            color: #222;
            line-height: 1.6;
            white-space: pre; 
            text-align: left; 
            /* 🔥 已改回等线字体 */
            font-family: "DengXian", "等线", "Microsoft YaHei", sans-serif; 
            display: inline-block; 
        }
    </style>
</head>

<body>
    <img src="bar.gif" class="bg-gif" alt="动图">
	<div class="container">
		<h2>斐波那契数列生成器</h2>
		<div class="result" id="result"></div>
	</div>

<script>
window.onload = function showFib() {
    let n = 97; 
    let seq = [];
    let a = 0n, b = 1n; 
    
    for (let i = 0; i < n; i++) {
        seq.push(a.toString());
        [a, b] = [b, a + b];
    }

    // 从第二个开始输出
    seq.shift(); 

    // 动态计算最大列宽（最长数字的长度 + 2个空格间距）
    const maxNumLength = Math.max(...seq.map(num => num.length));
    const COL_WIDTH = maxNumLength + 2; 
    
    const COLS = 6;       
    let rows = [];
    let line = "";
    
    // 将数列按6列分组拼接成行
    seq.forEach((numStr, idx) => {
        line += numStr.padStart(COL_WIDTH, " ");
        if ((idx + 1) % COLS === 0) {
            rows.push(line);
            line = "";
        }
    });
    if (line) rows.push(line); 

    // 构建等腰金字塔（左右对称）
    let totalRows = rows.length; 
    
    // 计算出最后一行（也就是整个金字塔最宽的一层）的总字符长度
    let bottomRowTotalWidth = rows[totalRows - 1].length;
    
    let pyramid = rows.map((row, index) => {
        // 当前行实际的字符长度
        let currentRowLength = row.length;
        
        // 等腰金字塔的核心公式：缩进空格数 = (最底层总宽度 - 当前行实际宽度) / 2
        let indent = Math.floor((bottomRowTotalWidth - currentRowLength) / 2);
        
        return " ".repeat(indent) + row;
    });

    document.getElementById("result").innerText = pyramid.join("\n");
};
</script>
</body>
</html>
